spring.application.name=pantherup-backend

# H2 Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JWT Values
spring.app.jwtSecret=mySecretKey123912738dafsgdsgsadgsfsafdasfsa
spring.app.jwtExpirationInMs=86400000
spring.ecom.app.jwtCookieName=PantherUp

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Configuration
spring.app.jwtSecret=mySecretKey123456789012345678901234567890
spring.app.jwtExpirationInMs=86400000
spring.app.jwtCookieName=pantherup

# Enable Debugging
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.http.converter.json=DEBUG
spring.web.error.include-message=always
spring.web.error.include-binding-errors=always
